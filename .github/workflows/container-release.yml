name: Build & Push MCP Server Containers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated package names (empty = all)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/maiife

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.packages }}" ]; then
            IFS=',' read -ra PKGS <<< "${{ github.event.inputs.packages }}"
            JSON=$(printf '%s\n' "${PKGS[@]}" | jq -R . | jq -s -c .)
          else
            JSON='["probe","mcp-audit","mcp-doctor","eval","prompt-score","prompt-craft","cost","model-match","ai-stack","context-sync","sub-audit","trace"]'
          fi
          echo "packages=$JSON" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.matrix.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.package }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/${{ matrix.package }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Verify image
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}-${{ matrix.package }}:latest || true
          echo "Published: ${{ env.IMAGE_PREFIX }}-${{ matrix.package }}:${{ steps.version.outputs.version }}"
